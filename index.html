            color: #A0A0A0;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);

        .question {

        .question-number {
            color: #0066FF;
            font-size: 0.9rem;

        .question label {

            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #E8E8E8;
        }

        .options {
            display: grid;
            gap: 15px;
        }

        .option {
            position: relative;
        }

        .option input[type="radio"] {
            position: absolute;
            opacity: 0;
        }

        .option label {
            display: block;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 102, 255, 0.3);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            font-weight: 400;
        }

        .option input[type="radio"]:checked + label {

            color: white;
        }

        .option label:hover {
            border-color: #0066FF;

        }

        .contact-section {

            padding-top: 40px;

        .input-group {

            margin-bottom: 8px;
            color: #A0A0A0;
            font-size: 0.9rem;

            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
